spring.application.name=inboxpilot-api
server.port=8080

# AI provider config
ai.endpoint=https://api.groq.com/openai/v1/chat/completions
ai.token=${GROQ_KEY:YOUR_GROQ_API_KEY}
ai.model=qwen/qwen3-32b

# Google Calendar OAuth config
google.client.id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
google.redirect.uri=http://localhost:8080/api/calendar/callback
